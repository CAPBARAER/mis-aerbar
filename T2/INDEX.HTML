<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Misas Capilla T2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; padding: 20px; }
#lista p { font-size: 1.2em; }
#ultima-actualizacion { color: #999; font-size: 0.9em; }
</style>
</head>
<body>

<h1>⛪ Capilla Terminal 2</h1>
<p>Misas previstas para hoy y próximos días:</p>

<div id="lista"></div>

<p id="ultima-actualizacion"></p>

<script>
let ultimaCarga = 0;

async function cargar() {
  try {
    const storage = localStorage.getItem('misas-T2');
    let misas = storage ? JSON.parse(storage) : [];
    
    if (misas.length === 0) {
      const r = await fetch('misas.json?' + Date.now());
      if (r.ok) {
        misas = await r.json();
        localStorage.setItem('misas-T2', JSON.stringify(misas));
      }
    }
    
    const html = misas.length ? misas.map((m, idx) =>
      `<p><b>${m.fecha}</b> — ${m.hora}<br><small>${m.nota || ''}</small></p>
       <a href="calendario.html?fecha=${m.fecha}&hora=${m.hora}&nota=${encodeURIComponent(m.nota || '')}">
         ➕ Añadir al calendario
       </a><hr>`
    ).join('') : '<p style="color: #999;">No hay misas registradas</p>';
    
    document.getElementById('lista').innerHTML = html;
    document.getElementById('ultima-actualizacion').textContent = 
      'Última actualización: ' + new Date().toLocaleTimeString('es-ES');
    ultimaCarga = Date.now();
  } catch(e) {
    console.error('Error cargando misas:', e);
    document.getElementById('lista').innerHTML = 
      '<p style="color: red;">Error al cargar misas. Intenta recargar la página.</p>';
  }
}

cargar();
setInterval(cargar, 300000);
</script>

</body>
</html>
